<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PetHealthAI - 智能对话</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fcfbfa;--accent:#e87b35;--accent-light:#fff8f0;
  --border:#f3e5d8;--text:#2d1f10;--text2:#8b6e4e;
  --radius:14px;--shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow:0 4px 16px rgba(0,0,0,.08);
}
html,body{height:100%;font-family:'Inter','Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text)}

/* ---- Header ---- */
header{display:flex;align-items:center;gap:12px;padding:12px 20px;
       background:rgba(255,255,255,.85);backdrop-filter:blur(12px);
       border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;flex-wrap:wrap}
header .logo{font-size:24px}
header h1{font-size:16px;font-weight:700;color:var(--text)}
header .subtitle{font-size:12px;color:var(--text2)}

.agent-select{padding:6px 12px;border:1.5px solid var(--border);border-radius:10px;
              font-size:13px;font-family:inherit;background:#fff;cursor:pointer;
              color:var(--text);outline:none;transition:border-color .2s}
.agent-select:focus{border-color:var(--accent)}

.config-row{display:flex;gap:8px;align-items:center;margin-left:auto;flex-wrap:wrap}
.config-row input{padding:5px 10px;border:1.5px solid var(--border);border-radius:8px;
                  font-size:12px;font-family:inherit;outline:none;width:200px;transition:border-color .2s}
.config-row input:focus{border-color:var(--accent)}
.config-row label{font-size:11px;color:var(--text2);white-space:nowrap}

.role-btns{display:flex;gap:6px}
.role-btn{padding:5px 14px;border:1.5px solid var(--border);border-radius:20px;
          font-size:12px;cursor:pointer;background:#fff;color:var(--text2);
          transition:all .2s;font-family:inherit;font-weight:500}
.role-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ---- Chat area ---- */
#chat{flex:1;overflow-y:auto;padding:20px 16px 100px;max-width:840px;margin:0 auto;width:100%;
      display:flex;flex-direction:column;gap:16px;min-height:0}
.page-wrap{display:flex;flex-direction:column;height:100vh}

/* Welcome */
.welcome{text-align:center;padding:40px 20px;animation:fadeSlideIn .5s ease both}
.welcome .icon{font-size:56px;margin-bottom:12px;animation:float 3s ease-in-out infinite}
.welcome h2{font-size:22px;font-weight:700;margin-bottom:8px}
.welcome p{font-size:14px;color:var(--text2);max-width:440px;margin:0 auto 24px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.role-cards{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.role-card{padding:16px 20px;border:1.5px solid var(--border);border-radius:var(--radius);
           cursor:pointer;background:#fff;min-width:140px;text-align:center;transition:all .2s}
.role-card:hover,.role-card.active{border-color:var(--accent);box-shadow:var(--shadow)}
.role-card .rc-icon{font-size:28px;margin-bottom:6px}
.role-card .rc-name{font-size:14px;font-weight:600}
.role-card .rc-desc{font-size:11px;color:var(--text2);margin-top:4px}

.examples{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:560px;margin:0 auto}
.example-btn{padding:8px 16px;border:1.5px solid var(--border);border-radius:20px;
             font-size:13px;cursor:pointer;background:#fff;color:var(--text);
             transition:all .2s;font-family:inherit}
.example-btn:hover{border-color:var(--accent);background:var(--accent-light)}

/* Messages */
.msg{display:flex;gap:10px;max-width:780px;width:100%;animation:fadeSlideIn .3s ease both}
.msg.user{flex-direction:row-reverse}
.msg .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
             justify-content:center;font-size:18px;flex-shrink:0;background:var(--accent-light);border:1px solid var(--border)}
.msg.user .avatar{background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 70%,#fff))}
.msg .bubble{padding:12px 16px;border-radius:var(--radius);font-size:14px;line-height:1.7;
             max-width:680px;word-break:break-word;box-shadow:var(--shadow-sm)}
.msg.user .bubble{background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 80%,#000));
                  color:#fff;border-bottom-right-radius:4px}
.msg.assistant .bubble{background:#fff;border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.assistant .bubble h1,.msg.assistant .bubble h2,.msg.assistant .bubble h3{font-size:15px;font-weight:700;margin:12px 0 6px}
.msg.assistant .bubble p{margin:4px 0}
.msg.assistant .bubble ul,.msg.assistant .bubble ol{padding-left:20px;margin:4px 0}
.msg.assistant .bubble code{background:rgba(0,0,0,.05);padding:1px 5px;border-radius:4px;font-size:13px}
.msg.assistant .bubble pre{background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0}
.msg.assistant .bubble pre code{background:none;color:inherit;padding:0}
.msg.assistant .bubble a{color:var(--accent);text-decoration:underline}
.msg.assistant .bubble blockquote{border-left:3px solid var(--accent);padding-left:12px;color:var(--text2);margin:8px 0}

/* Think box */
.think-box{max-width:780px;width:100%;margin:0 auto;border:1px solid var(--border);
           border-radius:var(--radius);overflow:hidden;background:var(--accent-light);
           animation:fadeSlideIn .3s ease both}
.think-header{padding:8px 14px;font-size:12px;font-weight:600;color:var(--text2);
              cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none}
.think-header::before{content:'';display:inline-block;width:0;height:0;
                      border-left:5px solid var(--text2);border-top:4px solid transparent;
                      border-bottom:4px solid transparent;transition:transform .2s}
.think-box.open .think-header::before{transform:rotate(90deg)}
.think-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.think-box.open .think-body{max-height:600px;overflow-y:auto}
.think-line{padding:4px 14px;font-size:12px;color:var(--text2);animation:fadeSlideIn .25s ease both}

/* Input area */
#input-area{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;
            background:rgba(255,255,255,.9);backdrop-filter:blur(12px);
            border-top:1px solid var(--border);z-index:100}
#input-area .inner{max-width:780px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
#input-area textarea{flex:1;resize:none;border:1.5px solid var(--border);border-radius:12px;
                     padding:10px 14px;font-size:14px;font-family:inherit;outline:none;
                     min-height:44px;max-height:120px;transition:border-color .2s;line-height:1.5}
#input-area textarea:focus{border-color:var(--accent)}
#send-btn{padding:10px 20px;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 80%,#000));
          color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;
          cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
#send-btn:disabled{opacity:.4;cursor:not-allowed}
#send-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}

/* Feedback bar */
.feedback-bar{max-width:780px;width:100%;margin:6px auto 0;background:linear-gradient(135deg,var(--accent-light),#fff);
              border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;
              display:grid;grid-template-columns:auto auto minmax(180px,1fr) auto;align-items:center;gap:10px;
              animation:fadeSlideIn .35s ease both;box-shadow:var(--shadow-sm)}
.feedback-bar .fb-label{font-size:13px;color:var(--text2);white-space:nowrap}
.star-group{display:grid;grid-template-columns:repeat(5,44px);gap:8px;align-items:center}
.star{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;
      cursor:pointer;background:#fff;border:1px solid rgba(251,191,36,.18);font-size:24px;color:#d1d5db;
      transition:all .15s;border-radius:999px;-webkit-appearance:none;appearance:none;font-family:inherit}
.star:hover,.star.active,.star.hovered{color:#fbbf24;background:#fffaf0;border-color:rgba(251,191,36,.45)}
.fb-comment{flex:1;resize:none;border:1.5px solid var(--border);border-radius:10px;
            padding:8px 12px;font-size:13px;font-family:inherit;min-height:36px;max-height:60px;outline:none;width:100%}
.fb-comment:focus{border-color:var(--accent)}
.fb-submit{padding:8px 20px;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 80%,#000));
           color:#fff;border:none;border-radius:10px;font-size:13px;cursor:pointer;font-weight:600;white-space:nowrap;transition:all .2s}
.fb-submit:disabled{opacity:.4;cursor:not-allowed}
.fb-done{font-size:13px;color:var(--accent);font-weight:600;animation:fadeSlideIn .3s ease both}

/* Responsive */
@media(max-width:600px){
  header{padding:10px 12px;gap:8px}
  .config-row{margin-left:0;width:100%}
  .config-row input{width:100%;flex:1}
  .feedback-bar{grid-template-columns:1fr;padding:10px 12px;gap:8px}
  .star-group{grid-template-columns:repeat(5,1fr);width:100%}
}
</style>
</head>
<body>
<div class="page-wrap">

<header>
  <span class="logo" id="header-logo">&#x1F43E;</span>
  <div>
    <h1 id="header-title">PetMind 宠物健康助手</h1>
    <div class="subtitle" id="header-sub">智能问答 · RAG 知识检索 · 工具调用</div>
  </div>

  <select class="agent-select" id="agent-select" title="切换 Agent">
    <option value="petmind">PetMind 宠物健康</option>
    <option value="pandamind">PandaMind 大熊猫百科</option>
  </select>

  <div class="role-btns" id="role-btns"></div>

  <div class="config-row">
    <label>API:</label>
    <input id="cfg-url" placeholder="http://localhost:8000">
    <label>Key:</label>
    <input id="cfg-key" type="password" placeholder="sk-..." style="width:140px">
  </div>
</header>

<div id="chat"></div>

<div id="input-area">
  <div class="inner">
    <textarea id="user-input" rows="1" placeholder="输入你的问题..."></textarea>
    <button id="send-btn">发送</button>
  </div>
</div>

</div>

<script>
/* ===== Agent Configurations ===== */
const AGENTS = {
  petmind: {
    label: 'PetMind 宠物健康助手',
    sub: '智能问答 · RAG 知识检索 · 工具调用',
    defaultUrl: 'http://localhost:8000',
    defaultKey: 'sk-pethealthai-default-key-2026',
    model: 'agent-plan-solve', maxTokens: 1500,
    emoji: '\u{1F43E}', userEmoji: '\u{1F9D1}',
    accent: '#e87b35', accentLight: '#fff8f0',
    border: '#f3e5d8', bg: '#fcfbfa', text2: '#8b6e4e',
    roles: {
      pet_owner:    { icon: '\u{1F43E}', name: '宠物主', desc: '日常护理建议' },
      veterinarian: { icon: '\u{1FA7A}', name: '兽医',   desc: '专业临床分析' },
    },
    defaultRole: 'pet_owner',
    examples: {
      pet_owner:    ['狗狗突然不吃饭怎么办？','猫咪频繁打喷嚏是什么原因？','幼犬疫苗接种时间表？','狗狗皮肤发红掉毛怎么处理？'],
      veterinarian: ['犬细小病毒鉴别诊断与治疗方案？','猫慢性肾病 IRIS 分期管理？','犬心丝虫感染的影像学特征？','猫甲亢的药物与手术方案对比？'],
    },
  },
  pandamind: {
    label: 'PandaMind 大熊猫百科',
    sub: '知识问答 · 文献检索 · 联网搜索',
    defaultUrl: 'http://localhost:8001',
    defaultKey: 'sk-pethealthai-default-key-2026',
    model: 'panda-plan-solve', maxTokens: 2048,
    emoji: '\u{1F43C}', userEmoji: '\u{1F464}',
    accent: '#2e7d32', accentLight: '#edf7ed',
    border: '#ceeada', bg: '#f5fbf5', text2: '#5f7063',
    roles: {
      enthusiast: { icon: '\u{1F38B}', name: '爱好者', desc: '科普趣味解答' },
      researcher: { icon: '\u{1F52C}', name: '研究员', desc: '学术严谨分析' },
    },
    defaultRole: 'enthusiast',
    examples: {
      enthusiast: ['大熊猫一天能吃多少竹子？','为什么大熊猫是黑白色的？','大熊猫的寿命一般有多长？','野生大熊猫还有多少只？'],
      researcher: ['大熊猫 MHC 基因多态性研究进展','圈养大熊猫肠梗阻的病因分析','大熊猫肠道微生物组与纤维素降解','秦岭与四川种群遗传分化'],
    },
  },
};

/* ===== State ===== */
let currentAgent = 'petmind';
let currentRole = '';
let messages = [];
let isSending = false;

/* ===== DOM refs ===== */
const $chat = document.getElementById('chat');
const $input = document.getElementById('user-input');
const $sendBtn = document.getElementById('send-btn');
const $agentSel = document.getElementById('agent-select');
const $cfgUrl = document.getElementById('cfg-url');
const $cfgKey = document.getElementById('cfg-key');

/* ===== Theme switching ===== */
function applyTheme(ag) {
  const r = document.documentElement.style;
  r.setProperty('--accent', ag.accent);
  r.setProperty('--accent-light', ag.accentLight);
  r.setProperty('--border', ag.border);
  r.setProperty('--bg', ag.bg);
  r.setProperty('--text2', ag.text2);
  document.getElementById('header-logo').textContent = ag.emoji;
  document.getElementById('header-title').textContent = ag.label;
  document.getElementById('header-sub').textContent = ag.sub;
}

function buildRoleBtns(ag) {
  const $c = document.getElementById('role-btns');
  $c.innerHTML = '';
  for (const [key, r] of Object.entries(ag.roles)) {
    const btn = document.createElement('button');
    btn.className = 'role-btn' + (key === currentRole ? ' active' : '');
    btn.textContent = r.icon + ' ' + r.name;
    btn.onclick = () => switchRole(key);
    $c.appendChild(btn);
  }
}

function switchRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-btn').forEach((b, i) => {
    b.classList.toggle('active', Object.keys(AGENTS[currentAgent].roles)[i] === role);
  });
  showWelcome();
}

function showWelcome() {
  const ag = AGENTS[currentAgent];
  const roleInfo = ag.roles[currentRole];
  const exs = ag.examples[currentRole] || [];
  // Only show if no messages
  let w = document.getElementById('welcome-panel');
  if (w) w.remove();
  if (messages.length > 0) return;

  const rolesHtml = Object.entries(ag.roles).map(([k, r]) =>
    `<div class="role-card ${k === currentRole ? 'active' : ''}" onclick="switchRole('${k}')">
      <div class="rc-icon">${r.icon}</div>
      <div class="rc-name">${r.name}</div>
      <div class="rc-desc">${r.desc}</div>
    </div>`
  ).join('');

  const exHtml = exs.map(q =>
    `<button class="example-btn" onclick="sendExample(this.textContent)">${q}</button>`
  ).join('');

  $chat.innerHTML = `<div class="welcome" id="welcome-panel">
    <div class="icon">${ag.emoji}</div>
    <h2>欢迎使用 ${ag.label}</h2>
    <p>${ag.sub}</p>
    <div class="role-cards">${rolesHtml}</div>
    <div class="examples">${exHtml}</div>
  </div>`;
}

function switchAgent(name) {
  if (name === currentAgent && messages.length === 0) return;
  currentAgent = name;
  const ag = AGENTS[name];
  currentRole = ag.defaultRole;
  messages = [];
  $cfgUrl.value = ag.defaultUrl;
  $cfgKey.value = ag.defaultKey;
  applyTheme(ag);
  buildRoleBtns(ag);
  showWelcome();
  $input.placeholder = '输入你的问题...';
}

/* ===== Messaging ===== */
function scroll() { $chat.scrollTop = $chat.scrollHeight; }

function createAssistantMsg() {
  const id = 'msg-' + Date.now();
  const ag = AGENTS[currentAgent];
  $chat.insertAdjacentHTML('beforeend',
    `<div class="think-box open" id="${id}-think">
      <div class="think-header" onclick="this.parentElement.classList.toggle('open')">思考过程</div>
      <div class="think-body"></div>
    </div>
    <div class="msg assistant" id="${id}">
      <div class="avatar">${ag.emoji}</div>
      <div class="bubble"></div>
    </div>`);
  scroll();
  return id;
}

function addThinkLine(msgId, text) {
  const body = document.querySelector(`#${msgId}-think .think-body`);
  if (!body) return;
  body.insertAdjacentHTML('beforeend', `<div class="think-line">${text}</div>`);
  body.scrollTop = body.scrollHeight;
}

let _renderTimer = null;
function streamRender(msgId, content) {
  clearTimeout(_renderTimer);
  _renderTimer = setTimeout(() => {
    const bubble = document.querySelector(`#${msgId} .bubble`);
    if (bubble) { bubble.innerHTML = marked.parse(content); scroll(); }
  }, 80);
}

function showFeedback(msgId, reqId) {
  const bar = document.createElement('div');
  bar.className = 'feedback-bar';
  let selectedRating = 0;
  const stars = [1,2,3,4,5].map(n =>
    `<button type="button" class="star" data-n="${n}" title="${n} 星">\u2605</button>`
  ).join('');
  bar.innerHTML = `<span class="fb-label">回答质量如何？</span>
    <div class="star-group">${stars}</div>
    <textarea class="fb-comment" placeholder="补充评论（可选）" rows="1"></textarea>
    <button type="button" class="fb-submit" disabled>提交</button>`;

  bar.querySelectorAll('.star').forEach(s => {
    s.addEventListener('mouseenter', () => {
      const n = parseInt(s.dataset.n);
      bar.querySelectorAll('.star').forEach((st, i) => st.classList.toggle('hovered', i < n));
    });
    s.addEventListener('mouseleave', () => bar.querySelectorAll('.star').forEach(st => st.classList.remove('hovered')));
    s.addEventListener('click', () => {
      selectedRating = parseInt(s.dataset.n);
      bar.querySelectorAll('.star').forEach((st, i) => st.classList.toggle('active', i < selectedRating));
      bar.querySelector('.fb-submit').disabled = false;
    });
  });

  bar.querySelector('.fb-submit').addEventListener('click', async function() {
    if (!selectedRating) return;
    this.disabled = true; this.textContent = '提交中...';
    const comment = bar.querySelector('.fb-comment').value.trim();
    const baseUrl = $cfgUrl.value.replace(/\/+$/, '');
    try {
      const r = await fetch(baseUrl + '/qa/feedback', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ request_id: reqId, rating: selectedRating, comment })
      });
      bar.innerHTML = r.ok
        ? '<span class="fb-done">感谢你的反馈！</span>'
        : '<span class="fb-done" style="color:var(--text2)">提交失败</span>';
    } catch(e) { bar.innerHTML = '<span class="fb-done" style="color:var(--text2)">网络错误</span>'; }
  });

  const msgEl = document.getElementById(msgId);
  if (msgEl) msgEl.after(bar);
  scroll();
}

/* ===== Send & Stream ===== */
async function send(text) {
  text = (text || '').trim();
  if (!text || isSending) return;
  isSending = true;
  $sendBtn.disabled = true;

  // Remove welcome
  const w = document.getElementById('welcome-panel');
  if (w) w.remove();

  const ag = AGENTS[currentAgent];

  // User message
  messages.push({ role: 'user', content: text });
  $chat.insertAdjacentHTML('beforeend',
    `<div class="msg user"><div class="avatar">${ag.userEmoji}</div><div class="bubble">${escHtml(text)}</div></div>`);
  scroll();

  const msgId = createAssistantMsg();
  let fullContent = '';
  let reqId = '';

  const baseUrl = ($cfgUrl.value || ag.defaultUrl).replace(/\/+$/, '');
  const apiKey = $cfgKey.value || ag.defaultKey;

  try {
    const resp = await fetch(baseUrl + '/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey,
      },
      body: JSON.stringify({
        model: ag.model,
        messages: messages.slice(-12),
        stream: true,
        temperature: 0.7,
        max_tokens: ag.maxTokens,
        user_role: currentRole,
        debug_timing: true,
      }),
    });

    if (!resp.ok) {
      const err = await resp.text();
      document.querySelector(`#${msgId} .bubble`).textContent = 'API 错误: ' + resp.status + ' ' + err.slice(0, 200);
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      const lines = buf.split('\n');
      buf = lines.pop() || '';

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith('data:')) continue;
        const payload = trimmed.slice(5).trim();
        if (payload === '[DONE]') continue;

        let chunk;
        try { chunk = JSON.parse(payload); } catch { continue; }

        if (chunk.id) reqId = chunk.id;
        const choice = (chunk.choices || [])[0] || {};
        const delta = choice.delta || {};
        const finish = choice.finish_reason;
        const status = chunk.agent_status;
        const detail = chunk.agent_detail || {};

        // Think box updates
        if (status === 'planning') addThinkLine(msgId, '\u{1F4CB} ' + (detail.message || '制定计划中...'));
        else if (status === 'thinking') addThinkLine(msgId, '\u{1F914} 思考中...');
        else if (status === 'plan_complete') {
          const steps = (detail.plan || []).filter(s => s.type === 'tool').map(s => s.tool_name).join(' \u2192 ');
          addThinkLine(msgId, '\u2705 计划: ' + (steps || 'direct') + (detail.fast_path ? ' (快速路径)' : ''));
        }
        else if (status === 'tool_calling') addThinkLine(msgId, '\u{1F527} 调用: ' + (detail.tool_name || ''));
        else if (status === 'tool_complete') addThinkLine(msgId, '\u2705 返回 ' + (detail.hits_count || 0) + ' 条结果');
        else if (status === 'generating') {
          const tb = document.getElementById(msgId + '-think');
          if (tb) tb.classList.remove('open');
        }
        else if (status === 'timing_summary' && detail.timing) {
          const total = detail.timing.find(t => t.step === 'total');
          if (total) addThinkLine(msgId, '\u23F1 总耗时 ' + (total.ms / 1000).toFixed(1) + 's');
        }

        // Content streaming
        if (delta.content) {
          fullContent += delta.content;
          streamRender(msgId, fullContent);
        }

        // Finish
        if (finish === 'stop') {
          const bubble = document.querySelector(`#${msgId} .bubble`);
          if (bubble) bubble.innerHTML = marked.parse(fullContent);
          messages.push({ role: 'assistant', content: fullContent });
          if (reqId) showFeedback(msgId, reqId);
          scroll();
        }
      }
    }
  } catch (e) {
    document.querySelector(`#${msgId} .bubble`).textContent = '连接失败: ' + e.message;
  } finally {
    isSending = false;
    $sendBtn.disabled = false;
    $input.focus();
  }
}

function sendExample(text) { $input.value = text; send(text); }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* ===== Event listeners ===== */
$sendBtn.addEventListener('click', () => { send($input.value); $input.value = ''; });
$input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send($input.value); $input.value = ''; }
});
$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
});
$agentSel.addEventListener('change', () => switchAgent($agentSel.value));

/* ===== Init ===== */
switchAgent('petmind');
</script>
